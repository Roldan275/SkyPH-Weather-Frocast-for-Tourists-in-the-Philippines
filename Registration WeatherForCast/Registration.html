<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register UI</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(6px);
        background: rgba(0,0,0,0.2);
    }

    .login-container {
        position: relative;
        background: rgba(255, 255, 255, 0.5);
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .close-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 28px;
        height: 28px;
        background: #3498db;
        color: #fff;
        border: none;
        border-radius: 50%;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        z-index: 2;
    }
    .close-btn:hover {
        background: #2176b6;
    }

    h2 {
        margin-bottom: 20px;
        letter-spacing: 2px;
    }

    .input-group {
        margin-bottom: 15px;
        text-align: left;
    }

    .input-group label {
        font-size: 13px;
        color: #333;
    }

    .input-group input {
        width: 100%;
        padding: 10px;
        border: none;
        border-bottom: 2px solid #ccc;
        background: transparent;
        outline: none;
    }

    .input-group input:focus {
        border-bottom: 2px solid #3498db;
    }

    .login-btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #3498db;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-btn:hover {
        background: #2980b9;
    }

    .signup {
        margin-top: 15px;
        font-size: 13px;
    }

    .signup a {
        color: #3498db;
        text-decoration: none;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="login-container">
    <button class="close-btn" onclick="window.location.href='../Login WeatherForcast/login.html'">&times;</button>
    <h2>REGISTER</h2>

    <form action="../Login WeatherForcast/login.html" method="GET">

        <div class="input-group">
            <label>First Name</label>
            <input type="text" name="first_name" placeholder="Enter your first name" required>
        </div>

        <div class="input-group">
            <label>Middle Name</label>
            <input type="text" name="middle_name" placeholder="Enter your middle name">
        </div>

        <div class="input-group">
            <label>Last Name</label>
            <input type="text" name="last_name" placeholder="Enter your last name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="login-btn">Sign Up</button>

        </form>

        <p class="login-text">
            Already have an Account? <a href="../Login WeatherForcast/login.html">Login</a>
        </p>
    </div>

</body>
</html>
