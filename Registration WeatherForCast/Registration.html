```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register UI</title>

<style>
* {
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
    font-family: Arial, sans-serif;
    position: relative;
}

.login-container {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 30px;
    border-radius: 24px;
    width: 420px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
}

.close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    background: rgba(255, 255, 255, 0.2);
    color: #333;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

h2 {
    margin-bottom: 25px;
    font-size: 24px;
    color: #2a7be4;
    font-weight: 700;
}

.input-group {
    margin-bottom: 16px;
    text-align: left;
}

.input-group label {
    display: block;
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
}

.input-group input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #dfe3ea;
    border-radius: 12px;
    background: #f9fbff;
    font-size: 15px;
    outline: none;
}

.input-group input:focus {
    border-color: #2a7be4;
    box-shadow: 0 0 0 3px rgba(42, 123, 228, 0.1);
}

.login-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #2a7be4, #1e5fc4);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}

.signup {
    margin-top: 20px;
    font-size: 14px;
    color: #666;
}

.signup a {
    color: #2a7be4;
    text-decoration: none;
    font-weight: 600;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(6px);
    background: rgba(0,0,0,0.4);
    z-index: 1;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-container">
    <button class="close-btn" onclick="window.location.href='../Login WeatherForcast/login.html'">&times;</button>

    <h2>REGISTER</h2>

    <!-- CONNECTED TO PHP -->
    <form action="register.php" method="POST">

        <div class="input-group">
            <label>First Name</label>
            <input type="text" name="first_name" placeholder="Enter your first name" required>
        </div>

        <div class="input-group">
            <label>Middle Name</label>
            <input type="text" name="middle_name" placeholder="Enter your middle name">
        </div>

        <div class="input-group">
            <label>Last Name</label>
            <input type="text" name="last_name" placeholder="Enter your last name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="login-btn">Sign Up</button>

    </form>

    <p class="signup">
        Already have an Account?
        <a href="../Login WeatherForcast/login.html">Login</a>
    </p>

</div>

</body>
</html>
