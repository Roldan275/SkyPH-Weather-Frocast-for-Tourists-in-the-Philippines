<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login UI</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(6px);
        background: rgba(0,0,0,0.2);
    }

    .login-container {
        position: relative;
        background: rgba(255, 255, 255, 0.5);
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 2;
        }
        .close-btn:hover {
            background: #2176b6;
    }

    h2 {
        margin-bottom: 20px;
        letter-spacing: 2px;
    }

    .input-group {
        margin-bottom: 15px;
        text-align: left;
    }

    .input-group label {
        font-size: 13px;
        color: #333;
    }

    .input-group input {
        width: 100%;
        padding: 10px;
        border: none;
        border-bottom: 2px solid #ccc;
        background: transparent;
        outline: none;
    }

    .input-group input:focus {
        border-bottom: 2px solid #3498db;
    }

    .options {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 15px;
    }

    .options a {
        text-decoration: none;
        color: #3498db;
    }

    .login-btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #3498db;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-btn:hover {
        background: #2980b9;
    }

    .signup {
        margin-top: 15px;
        font-size: 13px;
    }

    .signup a {
        color: #3498db;
        text-decoration: none;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-container">
    <button class="close-btn" onclick="document.querySelector('.login-container').style.display='none'">&times;</button>
    <h2>LOGIN</h2>

    <form id="loginForm" action="login.php" method="POST">
        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot password?</a>
        </div>

    <button class="login-btn">Login</button>

    <div class="signup">
        Don’t have an account? <a href="../Registration WeatherForCast/Registration.html">Signup</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        var email = this.email.value.trim();
        var password = this.password.value.trim();

        if (!email || !password) {
            alert('Please enter email and password.');
            event.preventDefault();
            return;
        }

        // Form will submit if validation passes
    });
</script>

</body>
</html>
